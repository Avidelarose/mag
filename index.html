<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>NŌVA — магазин</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, 'SF Pro Text', system-ui, Helvetica, sans-serif;
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
            background: linear-gradient(145deg, #0a0a0a 0%, #141414 100%);
            color: #ffffff;
        }
        /* Светлая тема */
        body.theme-light {
            background: linear-gradient(145deg, #f5f5f7, #e8e8ed);
            color: #1c1c1e;
        }
        body.theme-light .product-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); }
        body.theme-light .product-name-card { color: #1c1c1e; }
        body.theme-light .product-price-card { color: #d90429; }
        body.theme-light .vip-sidebar { background: rgba(255,255,255,0.85); }
        body.theme-light .vip-name, body.theme-light .vip-price { color: #1c1c1e; }
        body.theme-light .top-bar { background: rgba(255,255,255,0.98); border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        body.theme-light .nav-btn { background: rgba(0,0,0,0.05); color: #1c1c1e; }
        body.theme-light .cart-container, body.theme-light .admin-container { background: rgba(255,255,255,0.7); color: #1c1c1e; }
        /* ========== ШАПКА ========== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 620;
            background: linear-gradient(135deg, #d90429, #9b1df0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .nav-links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 590;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.2rem; }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -15px;
            background: #d90429;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
        }
        /* ========== ТОВАРЫ ========== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        .product-card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .product-card:active { transform: scale(0.98); }
        .product-media { width: 100%; height: 150px; object-fit: cover; background: #1f1f2a; }
        .product-info-card { padding: 12px; text-align: center; }
        .product-name-card { font-weight: 590; font-size: 0.9rem; margin-bottom: 4px; }
        .product-price-card { font-weight: 620; font-size: 1rem; color: #ff6b8a; }
        /* ========== VIP-БЛОК ========== */
        .vip-sidebar {
            background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(30,20,40,0.8));
            border-radius: 28px;
            padding: 20px;
            margin: 0 20px 20px 20px;
            border: 2px solid;
            border-image: linear-gradient(135deg, #d4af37, #ffd700) 1;
            text-align: center;
        }
        .vip-label {
            background: #d4af37;
            color: #000;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .vip-media img, .vip-media video { width: 100%; max-height: 140px; object-fit: cover; border-radius: 20px; }
        .vip-name { font-weight: 600; font-size: 1rem; margin: 8px 0; }
        .vip-price { font-size: 1.1rem; font-weight: 700; color: #d4af37; }
        .vip-btn {
            background: #d90429;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        /* ========== КОРЗИНА ========== */
        .cart-container {
            max-width: 700px;
            margin: 20px auto;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 24px;
        }
        .cart-item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
        .btn-add {
            background: linear-gradient(135deg, #d90429, #9b1df0);
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            color: white;
        }
        .form-group { margin-bottom: 20px; }
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: 0.5px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 1rem;
        }
        .file-label {
            background: rgba(0,0,0,0.5);
            padding: 14px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            border: 1px dashed #d4af37;
        }
        .bottom-instruction {
            text-align: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 44px;
            padding: 20px;
            margin: 20px;
        }
        /* ========== АДМИН-ПАНЕЛЬ (АВИТО) ========== */
        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 24px;
        }
        .admin-tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 24px;
            padding-bottom: 12px;
            flex-wrap: wrap;
        }
        .admin-tab {
            background: none;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: #aaa;
        }
        .admin-tab.active { background: #d90429; color: white; }
        .products-table {
            width: 100%;
            border-collapse: collapse;
        }
        .products-table th, .products-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }
        .product-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .status-active { background: #2e7d32; color: white; }
        .status-hidden { background: #9e9e9e; color: white; }
        .edit-btn, .toggle-btn, .delete-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 0 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 28px;
            border: none;
            background: #2a2a2a;
            color: white;
        }
        .media-preview { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .save-btn { background: #d4af37; color: black; padding: 12px; border-radius: 40px; border: none; font-weight: bold; width: 100%; margin-top: 10px; }
        .close-modal { background: #333; color: white; padding: 10px; border-radius: 40px; border: none; width: 100%; margin-top: 10px; }
        .page { display: none; }
        .page.active { display: block; }
        .hidden { display: none; }
        @media (max-width: 700px) {
            .products-table th, .products-table td { font-size: 11px; padding: 8px 4px; }
            .admin-tab { padding: 6px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body class="theme-dark">

<div class="top-bar">
    <div class="logo" onclick="showPage('main')">NŌVA</div>
    <div class="nav-links">
        <button class="nav-btn" onclick="showPage('main')">Главная</button>
        <button class="nav-btn" onclick="showPage('cart')">Корзина</button>
        <button class="nav-btn" onclick="toggleTheme()">🎨 Тема</button>
        <button class="nav-btn" onclick="showPage('admin')">Админ</button>
    </div>
    <div class="cart-icon" onclick="showPage('cart')">
        🛒 <span id="cartCount" class="cart-count">0</span>
    </div>
</div>

<!-- ГЛАВНАЯ -->
<div id="mainPage" class="page active">
    <div class="products-grid" id="productsContainer"></div>
    <div class="vip-sidebar" id="vipSidebar"></div>
    <div class="bottom-instruction">
        <div style="font-weight:600;">💳 Как сделать заказ</div>
        <p>1️⃣ Оплатите по СБП: <strong>8 963 090 58 96</strong> (Т‑Банк)</p>
        <p>2️⃣ Скриншот чека → оформите заказ</p>
        <p>3️⃣ Менеджер свяжется с вами</p>
        <a href="https://t.me/Tolpaplay" target="_blank" style="color:#d4af37;">👨‍💼 Написать менеджеру</a>
    </div>
</div>

<!-- КОРЗИНА -->
<div id="cartPage" class="page">
    <div class="cart-container">
        <h2>🛒 Корзина</h2>
        <div id="cartItemsList"></div>
        <div class="cart-total" id="cartTotal" style="text-align:right; margin-top:20px;">💰 Итого: 0 ₽</div>
        <button id="checkoutBtn" class="btn-add" style="margin-top:20px;">Оформить заказ</button>
    </div>
</div>

<!-- ОФОРМЛЕНИЕ ЗАКАЗА -->
<div id="orderPage" class="page">
    <div class="cart-container">
        <h2>✏️ Оформление</h2>
        <div id="orderSummary" style="background:rgba(0,0,0,0.3); border-radius:28px; padding:16px; margin-bottom:20px;"></div>
        <div class="form-group"><label>📞 Телефон</label><input type="tel" id="phone" placeholder="+7 900 000 00 00"></div>
        <div class="form-group"><label>📱 Telegram / ВК</label><input type="text" id="social" placeholder="@nickname"></div>
        <div class="form-group"><label>📍 Адрес</label><input type="text" id="address" placeholder="Челябинск..."></div>
        <div class="form-group"><label>⏰ Время</label><select id="timeSelect"><option>Не важно</option><option>09:00–12:00</option><option>12:00–15:00</option><option>15:00–18:00</option><option>18:00–21:00</option></select></div>
        <div class="form-group"><label>🧾 Фото чека</label><div class="file-label" id="fileLabel">📎 Загрузить чек<input type="file" id="receiptFile" accept="image/*" style="display:none"></div><div id="fileNameSpan"></div></div>
        <button id="submitOrderBtn" class="btn-add">✅ Отправить заказ</button>
        <button id="closeOrderBtn" class="btn-back" style="margin-top:12px; background:transparent; border:1px solid #d4af37; padding:14px; border-radius:44px;">← Назад</button>
    </div>
</div>

<!-- АДМИН-ПАНЕЛЬ (АВИТО) -->
<div id="adminPage" class="page">
    <div class="admin-container">
        <div id="adminLoginBlock">
            <input type="password" id="adminPass" placeholder="Пароль">
            <button onclick="checkAdminPass()" style="background:#d90429; padding:14px; border-radius:40px; width:100%; margin-top:10px; border:none; color:white;">Войти</button>
        </div>
        <div id="adminContentBlock" class="hidden">
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="active">✅ Активные</button>
                <button class="admin-tab" data-tab="hidden">🔒 Скрытые</button>
                <button class="admin-tab" data-tab="moderation">⏳ На модерации</button>
            </div>
            <div id="adminTableContainer"></div>
            <div style="text-align:center; margin-top:20px;">
                <button onclick="openAddModal()" style="background:#d4af37; border:none; padding:12px 24px; border-radius:40px; font-weight:bold;">➕ Добавить товар</button>
            </div>
        </div>
    </div>
</div>

<div id="successPage" class="page">
    <div class="cart-container" style="text-align:center;">
        <h2>✅ Заказ отправлен!</h2>
        <button onclick="showPage('main')" class="btn-add" style="margin-top:20px;">На главную</button>
    </div>
</div>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ Редактировать</h3>
        <input type="text" id="editName" placeholder="Название">
        <input type="number" id="editPrice" placeholder="Цена">
        <textarea id="editDesc" placeholder="Описание" rows="2"></textarea>
        <div id="editMediaList" class="media-preview"></div>
        <input type="text" id="newMediaUrl" placeholder="Ссылка на фото/видео">
        <button onclick="addMediaToEdit()" style="background:#333; padding:8px; border-radius:30px;">➕ Добавить медиа</button>
        <button onclick="saveEditProduct()" class="save-btn">💾 Сохранить</button>
        <button onclick="closeModal()" class="close-modal">✖ Закрыть</button>
    </div>
</div>

<script>
// ========== НАСТРОЙКИ ==========
const BOT_TOKEN = "8112529237:AAGX6nHQEnMcJKflsAg-SmclgdJCD5xzaZU";
const CHAT_ID = "5233384978";

// ========== ТОВАРЫ ==========
let PRODUCTS = [
    { id: 1, name: "💾 SSD 256 SP A56", price: 3650, description: "Высокоскоростной SSD", media: [], emoji: "💾", status: "active" },
    { id: 2, name: "🧸 Чебурашка", price: 2600, description: "Мягкая игрушка", media: [], emoji: "🧸", status: "active" },
    { id: 3, name: "🐉 Дракончик", price: 330, description: "Светится в темноте", media: ["Dragon_girl.jpg"], emoji: "🐉", status: "active" },
    { id: 4, name: "🔌 Зарядка в авто", price: 800, description: "", media: [], emoji: "🔌", status: "active" },
    { id: 5, name: "🃏 Мини колода карт", price: 700, description: "", media: [], emoji: "🃏", status: "active" },
    { id: 6, name: "🔑 Брелок", price: 300, description: "", media: ["Video/video_kulon.mp4"], emoji: "🔑", status: "active" },
    { id: 7, name: "🌸 Жилетка", price: 2145, description: "", media: [], emoji: "🌸", status: "active" },
    { id: 8, name: "💨 Игрушечные сигареты", price: 1500, description: "", media: [], emoji: "💨", status: "active" }
];

let cart = {};
let receiptFile = null;
let currentOrderItems = null;
let currentEditId = null;

// ========== СОХРАНЕНИЕ ==========
function saveProductsToLocal() { localStorage.setItem('nova_products', JSON.stringify(PRODUCTS)); }
function loadProductsFromLocal() {
    let saved = localStorage.getItem('nova_products');
    if (saved) { try { PRODUCTS = JSON.parse(saved); } catch(e){} }
    renderProducts();
    updateVipSidebar();
    updateCartUI();
}

// ========== ОТРИСОВКА ГЛАВНОЙ ==========
function renderProducts() {
    let container = document.getElementById('productsContainer');
    if (!container) return;
    container.innerHTML = '';
    for (let p of PRODUCTS) {
        if (p.status !== 'active') continue;
        let card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => alert(`📦 ${p.name}\n💰 ${p.price}₽\n📝 ${p.description || 'Описание отсутствует'}`);
        let mediaUrl = (p.media && p.media[0]) ? p.media[0] : '';
        let isVideo = mediaUrl && (mediaUrl.includes('.mp4') || mediaUrl.includes('.webm'));
        let mediaHtml = mediaUrl ? (isVideo ? `<video class="product-media" src="${mediaUrl}" autoplay muted loop playsinline></video>` : `<img class="product-media" src="${mediaUrl}" onerror="this.src='https://placehold.co/400x300/2a0a1a/ff6b8a?text=${p.name}'">`) : `<div class="product-media" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d90429,#9b1df0);font-size:2rem;">${p.emoji}</div>`;
        card.innerHTML = `${mediaHtml}<div class="product-info-card"><div class="product-name-card">${p.name}</div><div class="product-price-card">${p.price.toLocaleString()} ₽</div></div>`;
        container.appendChild(card);
    }
}
function updateVipSidebar() {
    let vipDiv = document.getElementById('vipSidebar');
    if (!vipDiv) return;
    let active = PRODUCTS.filter(p => p.status === 'active');
    if (active.length === 0) return;
    let vip = active[Math.floor(Math.random() * active.length)];
    let mediaUrl = (vip.media && vip.media[0]) ? vip.media[0] : '';
    let isVideo = mediaUrl && (mediaUrl.includes('.mp4') || mediaUrl.includes('.webm'));
    vipDiv.innerHTML = `<div class="vip-label">⚡ VIP РЕКОМЕНДАЦИЯ ⚡</div>
        <div class="vip-media">${isVideo ? `<video src="${mediaUrl}" autoplay muted loop playsinline></video>` : `<img src="${mediaUrl}" onerror="this.src='https://placehold.co/400x300/2a0a1a/ff6b8a?text=VIP'">`}</div>
        <div class="vip-name">${vip.name}</div>
        <div class="vip-price">${vip.price.toLocaleString()} ₽</div>
        <button class="vip-btn" onclick="addToCartVip(${vip.id})">🛒 В корзину</button>`;
}
function addToCartVip(id) { cart[id] = (cart[id] || 0) + 1; updateCartUI(); alert('✅ Добавлено в корзину'); }

// ========== КОРЗИНА ==========
function updateCartUI() { let total = 0; for (let i in cart) total += cart[i]; document.getElementById('cartCount').innerText = total; renderCartList(); }
function renderCartList() {
    let container = document.getElementById('cartItemsList'), total = 0, html = '';
    if (!container) return;
    for (let id in cart) {
        let p = PRODUCTS.find(x => x.id == id);
        if (p) { let q = cart[id], sum = p.price * q; total += sum; html += `<div class="cart-item"><div><strong>${p.name}</strong> × ${q}</div><div>${sum.toLocaleString()} ₽</div></div>`; }
    }
    if (!html) html = '<div style="text-align:center; padding:40px;">Корзина пуста</div>';
    container.innerHTML = html;
    document.getElementById('cartTotal').innerHTML = `💰 Итого: ${total.toLocaleString()} ₽`;
}
function showOrderScreen() {
    if (Object.keys(cart).length === 0) { alert("Корзина пуста"); return; }
    let total = 0, tq = 0, html = '';
    for (let id in cart) {
        let p = PRODUCTS.find(x => x.id == id);
        if (p) { let q = cart[id], sum = p.price * q; total += sum; tq += q; html += `<div>${p.name} — ${q} шт = ${sum} ₽</div>`; }
    }
    html += `<div style="margin-top:10px; font-weight:bold;">💰 Итого: ${total} ₽ (${tq} шт)</div>`;
    document.getElementById('orderSummary').innerHTML = html;
    currentOrderItems = {...cart};
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById('orderPage').classList.add('active');
}

// ========== TELEGRAM ==========
async function sendToTelegram(orderData) {
    let items = '';
    for (let id in orderData.items) {
        let p = PRODUCTS.find(x => x.id == id);
        if (p) items += `${p.name} — ${orderData.items[id]} шт = ${p.price * orderData.items[id]} ₽\n`;
    }
    const msg = `🛍️ НОВЫЙ ЗАКАЗ NŌVA\n\n📦 Товары:\n${items}\n💰 Итого: ${orderData.total} ₽\n\n👤 ${orderData.phone} | ${orderData.social}\n📍 ${orderData.address} | ⏰ ${orderData.time}\n🧾 Чек: ${orderData.hasPhoto ? 'есть фото' : 'нет фото'}`;
    try {
        if (orderData.photoFile) {
            let fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('caption', msg);
            fd.append('photo', orderData.photoFile);
            let r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            return r.ok;
        } else {
            let r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: msg }) });
            return r.ok;
        }
    } catch(e) { return false; }
}
async function submitOrder() {
    let phone = document.getElementById('phone').value.trim();
    let social = document.getElementById('social').value.trim();
    let address = document.getElementById('address').value.trim();
    let timeSlot = document.getElementById('timeSelect').value;
    if (!phone || !social || !address) { alert("Заполните все поля"); return; }
    if (Object.keys(currentOrderItems||{}).length === 0) { alert("Корзина пуста"); return; }
    let total = 0;
    for (let id in currentOrderItems) total += PRODUCTS.find(p => p.id == id)?.price * currentOrderItems[id] || 0;
    let orderData = { items: currentOrderItems, total, phone, social, address, time: timeSlot, hasPhoto: !!receiptFile, photoFile: receiptFile };
    let btn = document.getElementById('submitOrderBtn');
    btn.disabled = true; btn.innerText = "⏳ Отправка...";
    let sent = await sendToTelegram(orderData);
    if (sent) { cart = {}; receiptFile = null; updateCartUI(); document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.getElementById('successPage').classList.add('active'); }
    else { alert("❌ Ошибка. Напишите /start боту @My_daaate_bot"); }
    btn.disabled = false; btn.innerText = "✅ ОТПРАВИТЬ ЗАКАЗ";
}

// ========== АДМИНКА (АВИТО) ==========
function checkAdminPass() {
    let pass = document.getElementById('adminPass').value;
    if (pass === 'nova2025') {
        document.getElementById('adminLoginBlock').classList.add('hidden');
        document.getElementById('adminContentBlock').classList.remove('hidden');
        renderAdminTable('active');
        setupTabs();
    } else alert('Неверный пароль');
}
function setupTabs() {
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            renderAdminTable(tab.dataset.tab);
        };
    });
}
function renderAdminTable(statusFilter) {
    let filtered = PRODUCTS.filter(p => p.status === statusFilter);
    let html = `<table class="products-table"><thead><tr><th>ID</th><th>Название</th><th>Цена</th><th>Статус</th><th>Действия</th></tr></thead><tbody>`;
    filtered.forEach(p => {
        let statusClass = p.status === 'active' ? 'status-active' : (p.status === 'hidden' ? 'status-hidden' : 'status-moderation');
        let statusText = p.status === 'active' ? 'Активен' : (p.status === 'hidden' ? 'Скрыт' : 'На модерации');
        html += `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.price}₽</td><td><span class="product-status ${statusClass}">${statusText}</span></td>
        <td><button class="edit-btn" onclick="openEditModal(${p.id})">✏️</button>
        <button class="toggle-btn" onclick="toggleStatus(${p.id})">${p.status === 'active' ? '🔒' : '✅'}</button>
        <button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td></tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('adminTableContainer').innerHTML = html;
}
function toggleStatus(id) {
    let p = PRODUCTS.find(x => x.id == id);
    if (p.status === 'active') p.status = 'hidden';
    else if (p.status === 'hidden') p.status = 'active';
    else p.status = 'active';
    saveProductsToLocal();
    renderAdminTable(document.querySelector('.admin-tab.active').dataset.tab);
    renderProducts();
    updateVipSidebar();
}
function deleteProduct(id) {
    if (confirm('Удалить товар навсегда?')) {
        PRODUCTS = PRODUCTS.filter(p => p.id != id);
        saveProductsToLocal();
        renderAdminTable(document.querySelector('.admin-tab.active').dataset.tab);
        renderProducts();
        updateVipSidebar();
    }
}
function openEditModal(id) {
    currentEditId = id;
    let p = PRODUCTS.find(x => x.id == id);
    document.getElementById('editName').value = p.name;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editDesc').value = p.description || '';
    let mediaList = document.getElementById('editMediaList');
    mediaList.innerHTML = '';
    if (p.media) p.media.forEach((m, i) => {
        mediaList.innerHTML += `<div><img src="${m}" style="width:60px;height:60px;object-fit:cover;border-radius:12px;"><button onclick="removeMediaFromEdit(${i})">✖</button></div>`;
    });
    document.getElementById('editModal').classList.add('active');
}
function removeMediaFromEdit(idx) {
    let p = PRODUCTS.find(x => x.id == currentEditId);
    p.media.splice(idx, 1);
    openEditModal(currentEditId);
}
function addMediaToEdit() {
    let url = document.getElementById('newMediaUrl').value.trim();
    if (url) {
        let p = PRODUCTS.find(x => x.id == currentEditId);
        if (!p.media) p.media = [];
        p.media.push(url);
        openEditModal(currentEditId);
        document.getElementById('newMediaUrl').value = '';
    }
}
function saveEditProduct() {
    let p = PRODUCTS.find(x => x.id == currentEditId);
    p.name = document.getElementById('editName').value;
    p.price = parseInt(document.getElementById('editPrice').value);
    p.description = document.getElementById('editDesc').value;
    saveProductsToLocal();
    renderAdminTable(document.querySelector('.admin-tab.active').dataset.tab);
    renderProducts();
    updateVipSidebar();
    closeModal();
    alert('✅ Сохранено');
}
function openAddModal() {
    currentEditId = null;
    document.getElementById('editName').value = '';
    document.getElementById('editPrice').value = '';
    document.getElementById('editDesc').value = '';
    document.getElementById('editMediaList').innerHTML = '';
    document.getElementById('editModal').classList.add('active');
}
function saveAddProduct() {
    let name = document.getElementById('editName').value.trim();
    let price = parseInt(document.getElementById('editPrice').value);
    if (!name || isNaN(price)) { alert('Заполните название и цену'); return; }
    let newId = Date.now();
    PRODUCTS.push({ id: newId, name, price, description: document.getElementById('editDesc').value, media: [], emoji: '📦', status: 'active' });
    saveProductsToLocal();
    renderAdminTable(document.querySelector('.admin-tab.active').dataset.tab);
    renderProducts();
    updateVipSidebar();
    closeModal();
    alert('✅ Товар добавлен');
}
function closeModal() { document.getElementById('editModal').classList.remove('active'); }

// ========== НАВИГАЦИЯ И ТЕМЫ ==========
function showPage(page) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.getElementById(page + 'Page').classList.add('active');
    if (page === 'cart') renderCartList();
    if (page === 'main') { renderProducts(); updateVipSidebar(); }
}
function toggleTheme() {
    document.body.classList.toggle('theme-light');
    localStorage.setItem('nova_theme', document.body.classList.contains('theme-light') ? 'light' : 'dark');
}
if (localStorage.getItem('nova_theme') === 'light') document.body.classList.add('theme-light');

// ========== ЗАПУСК ==========
document.getElementById('checkoutBtn').onclick = showOrderScreen;
document.getElementById('closeOrderBtn').onclick = () => showPage('cart');
document.getElementById('submitOrderBtn').onclick = submitOrder;
document.getElementById('fileLabel').onclick = () => document.getElementById('receiptFile').click();
document.getElementById('receiptFile').onchange = (e) => { if (e.target.files.length) { receiptFile = e.target.files[0]; document.getElementById('fileNameSpan').innerText = `📸 ${receiptFile.name}`; } };
loadProductsFromLocal();
updateCartUI();
</script>
