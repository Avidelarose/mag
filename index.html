<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NŌVA Premium — магазин</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a0b14 0%, #0d0210 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
        }
        /* Шапка и навигация */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { font-size: 1.8rem; font-weight: bold; background: linear-gradient(135deg, #d90429, #9b1df0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #d90429;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 12px;
        }
        /* Главная страница — сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .product-card {
            background: rgba(0,0,0,0.5);
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #333;
        }
        .product-card:hover { transform: translateY(-4px); border-color: #d4af37; }
        .product-media {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1f1f2a;
        }
        .product-info-card { padding: 12px; text-align: center; }
        .product-name-card { font-weight: 600; color: white; }
        .product-price-card { color: #ff6b8a; font-weight: 700; margin-top: 4px; }

        /* Страница товара (отдельная) */
        .product-page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 48px;
        }
        .product-page-media {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .product-page-media img, .product-page-media video {
            max-height: 400px;
            border-radius: 32px;
            object-fit: contain;
        }
        .product-page-name { font-size: 2rem; font-weight: bold; color: #d4af37; }
        .product-page-price { font-size: 1.8rem; margin: 16px 0; }
        .product-page-desc { color: #ccc; line-height: 1.5; margin: 20px 0; }
        .product-page-qty { display: flex; align-items: center; gap: 16px; margin: 20px 0; }
        .product-page-qty button { background: #d4af37; border: none; width: 40px; height: 40px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; }
        .product-page-qty span { font-size: 1.2rem; min-width: 40px; text-align: center; }
        .btn-add { background: linear-gradient(135deg, #d90429, #9b1df0); color: white; border: none; padding: 14px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Корзина */
        .cart-container { max-width: 800px; margin: 40px auto; background: rgba(0,0,0,0.7); border-radius: 48px; padding: 32px; }
        .cart-item { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #333; }

        /* Админ-панель (отдельная страница) */
        .admin-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(0,0,0,0.8);
            border-radius: 48px;
            padding: 32px;
        }
        .admin-container input, .admin-container textarea, .admin-container select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
        }
        .admin-container button { background: #d4af37; color: black; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-right: 10px; }
        .media-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .media-item { background: #333; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; }
        .dropzone {
            border: 2px dashed #d4af37;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .bottom-instruction { text-align: center; margin-top: 40px; background: rgba(0,0,0,0.7); border-radius: 44px; padding: 24px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">NŌVA</div>
    <div class="nav-links">
        <a onclick="showPage('main')">Главная</a>
        <a onclick="showPage('cart')">Корзина</a>
        <a onclick="showPage('admin')">Админ</a>
    </div>
    <div class="cart-icon" onclick="showPage('cart')">
        🛒 <span id="cartCount" class="cart-count">0</span>
    </div>
</div>

<div id="mainPage" class="page">
    <div class="products-grid" id="productsContainer"></div>
    <div class="bottom-instruction">
        <div style="font-weight:700;">💳 Как сделать заказ</div>
        <p>1️⃣ Оплатите по СБП: <strong>8 963 090 58 96</strong> (Т‑Банк, Александр)</p>
        <p>2️⃣ Скриншот чека → оформите заказ</p>
        <p>3️⃣ Менеджер свяжется с вами</p>
    </div>
</div>

<div id="cartPage" class="page hidden">
    <div class="cart-container">
        <h2 style="color:#d4af37;">Корзина</h2>
        <div id="cartItemsList"></div>
        <div id="cartTotal" style="text-align:right; margin-top:20px; font-size:1.2rem;">💰 Итого: 0 ₽</div>
        <button id="checkoutBtn" class="btn-add" style="margin-top:20px;">Оформить заказ</button>
    </div>
</div>

<div id="adminPage" class="page hidden">
    <div class="admin-container">
        <h2 style="color:#d4af37;">👑 Админ-панель</h2>
        <div id="adminLoginBlock">
            <input type="password" id="adminPass" placeholder="Пароль">
            <button onclick="checkAdminPass()">Войти</button>
        </div>
        <div id="adminContentBlock" class="hidden">
            <h3>Редактировать товар</h3>
            <select id="productSelect" onchange="loadProductForEdit()"></select>
            <input type="text" id="editName" placeholder="Название">
            <input type="number" id="editPrice" placeholder="Цена">
            <textarea id="editDesc" placeholder="Описание" rows="3"></textarea>
            <div class="dropzone" id="dropzone">📸 Перетащите фото или видео сюда</div>
            <div id="editMediaList" class="media-list"></div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button onclick="saveProductEdit()">💾 Сохранить</button>
                <button onclick="deleteCurrentProduct()" style="background:#d90429;">🗑️ Удалить</button>
            </div>
            <h3 style="margin-top:30px;">➕ Новый товар</h3>
            <input type="text" id="newName" placeholder="Название">
            <input type="number" id="newPrice" placeholder="Цена">
            <textarea id="newDesc" placeholder="Описание"></textarea>
            <button onclick="addNewProduct()">➕ Добавить</button>
        </div>
    </div>
</div>

<div id="productDetailPage" class="page hidden">
    <div class="product-page" id="productDetailContainer"></div>
</div>

<script>
// === ТОВАРЫ ===
let PRODUCTS = [
    { id: 1, name: "SSD 256 SP A56", price: 3650, description: "Высокоскоростной SSD", media: [] },
    { id: 2, name: "Чебурашка", price: 2600, description: "Мягкая игрушка", media: [] },
    { id: 3, name: "Дракончик светящийся", price: 330, description: "Светится в темноте", media: [] }
];

let cart = {};
let currentProductId = null;
let currentQty = 1;

// === ЗАГРУЗКА/СОХРАНЕНИЕ ===
function saveProductsToLocal() { localStorage.setItem('nova_products', JSON.stringify(PRODUCTS)); }
function loadProductsFromLocal() {
    const saved = localStorage.getItem('nova_products');
    if (saved) { PRODUCTS = JSON.parse(saved); }
    renderProducts();
    updateCartUI();
}
loadProductsFromLocal();

// === ОТРИСОВКА ГЛАВНОЙ ===
function renderProducts() {
    const container = document.getElementById('productsContainer');
    if (!container) return;
    container.innerHTML = '';
    for (let p of PRODUCTS) {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.onclick = () => openProductPage(p.id);
        const firstMedia = p.media && p.media[0] ? p.media[0] : '';
        const isVideo = firstMedia && (firstMedia.includes('.mp4') || firstMedia.includes('webm'));
        card.innerHTML = `
            ${isVideo ? `<video class="product-media" src="${firstMedia}" autoplay muted loop playsinline></video>` : `<img class="product-media" src="${firstMedia}" onerror="this.src='https://placehold.co/400x300/2a0a1a/ff6b8a?text=${encodeURIComponent(p.name)}'">`}
            <div class="product-info-card">
                <div class="product-name-card">${p.name}</div>
                <div class="product-price-card">${p.price.toLocaleString()} ₽</div>
            </div>
        `;
        container.appendChild(card);
    }
}

// === СТРАНИЦА ТОВАРА ===
function openProductPage(id) {
    const p = PRODUCTS.find(x => x.id == id);
    if (!p) return;
    currentProductId = id;
    currentQty = 1;
    const container = document.getElementById('productDetailContainer');
    let mediaHtml = '';
    if (p.media && p.media.length) {
        for (let m of p.media) {
            const isVideo = m.includes('.mp4') || m.includes('webm');
            mediaHtml += isVideo ? `<video src="${m}" controls autoplay muted loop playsinline></video>` : `<img src="${m}">`;
        }
    } else {
        mediaHtml = `<div style="padding:20px; text-align:center;">📷 Нет фото</div>`;
    }
    container.innerHTML = `
        <div class="product-page-media">${mediaHtml}</div>
        <div class="product-page-name">${p.name}</div>
        <div class="product-page-price">${p.price.toLocaleString()} ₽</div>
        <div class="product-page-desc">${p.description || 'Описание отсутствует'}</div>
        <div class="product-page-qty">
            <button onclick="changeQty(-1)">−</button>
            <span id="detailQty">${currentQty}</span>
            <button onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-add" onclick="addToCartFromDetail()">Добавить в корзину</button>
        <button onclick="showPage('main')" style="margin-top:20px; background:transparent; border:1px solid #d4af37; padding:10px; border-radius:40px;">← Назад</button>
    `;
    showPage('productDetail');
}

function changeQty(delta) {
    let newQty = currentQty + delta;
    if (newQty < 1) newQty = 1;
    currentQty = newQty;
    const span = document.getElementById('detailQty');
    if (span) span.innerText = currentQty;
}

function addToCartFromDetail() {
    if (!currentProductId) return;
    cart[currentProductId] = (cart[currentProductId] || 0) + currentQty;
    updateCartUI();
    showPage('main');
    alert('Добавлено в корзину');
}

// === КОРЗИНА ===
function updateCartUI() {
    let totalCount = 0;
    for (let id in cart) totalCount += cart[id];
    document.getElementById('cartCount').innerText = totalCount;
    renderCartList();
}
function renderCartList() {
    const container = document.getElementById('cartItemsList');
    if (!container) return;
    let total = 0, html = '';
    for (let id in cart) {
        let p = PRODUCTS.find(x => x.id == id);
        if (p) {
            let q = cart[id];
            let sum = p.price * q;
            total += sum;
            html += `<div class="cart-item"><div><strong>${p.name}</strong> × ${q}</div><div>${sum.toLocaleString()} ₽</div></div>`;
        }
    }
    if (!html) html = '<div style="text-align:center; padding:20px;">Корзина пуста</div>';
    container.innerHTML = html;
    document.getElementById('cartTotal').innerHTML = `💰 Итого: ${total.toLocaleString()} ₽`;
}

// === АДМИН-ПАНЕЛЬ ===
function checkAdminPass() {
    const pass = document.getElementById('adminPass').value;
    if (pass === 'nova2025') {
        document.getElementById('adminLoginBlock').classList.add('hidden');
        document.getElementById('adminContentBlock').classList.remove('hidden');
        fillProductSelect();
        setupDragAndDrop();
    } else { alert('Неверный пароль'); }
}
function fillProductSelect() {
    const select = document.getElementById('productSelect');
    select.innerHTML = '';
    PRODUCTS.forEach((p, idx) => {
        select.innerHTML += `<option value="${idx}">${p.name}</option>`;
    });
    loadProductForEdit();
}
function loadProductForEdit() {
    const idx = document.getElementById('productSelect').value;
    const p = PRODUCTS[idx];
    document.getElementById('editName').value = p.name;
    document.getElementById('editPrice').value = p.price;
    document.getElementById('editDesc').value = p.description || '';
    const mediaList = document.getElementById('editMediaList');
    mediaList.innerHTML = '';
    if (p.media) {
        p.media.forEach((m, i) => {
            mediaList.innerHTML += `<div class="media-item">${m.split('/').pop()} <button onclick="removeMedia(${i})">✖</button></div>`;
        });
    }
}
function removeMedia(idx) {
    const prodIdx = document.getElementById('productSelect').value;
    PRODUCTS[prodIdx].media.splice(idx, 1);
    loadProductForEdit();
    renderProducts();
}
function saveProductEdit() {
    const idx = document.getElementById('productSelect').value;
    PRODUCTS[idx].name = document.getElementById('editName').value;
    PRODUCTS[idx].price = parseInt(document.getElementById('editPrice').value);
    PRODUCTS[idx].description = document.getElementById('editDesc').value;
    saveProductsToLocal();
    renderProducts();
    fillProductSelect();
    alert('Сохранено');
}
function deleteCurrentProduct() {
    if (!confirm('Удалить товар?')) return;
    const idx = document.getElementById('productSelect').value;
    PRODUCTS.splice(idx, 1);
    saveProductsToLocal();
    renderProducts();
    fillProductSelect();
    alert('Удалено');
}
function addNewProduct() {
    const name = document.getElementById('newName').value.trim();
    const price = parseInt(document.getElementById('newPrice').value);
    const desc = document.getElementById('newDesc').value.trim();
    if (!name || isNaN(price)) { alert('Заполните название и цену'); return; }
    const newId = Date.now();
    PRODUCTS.push({ id: newId, name, price, description: desc, media: [] });
    saveProductsToLocal();
    renderProducts();
    fillProductSelect();
    document.getElementById('newName').value = '';
    document.getElementById('newPrice').value = '';
    document.getElementById('newDesc').value = '';
    alert('Товар добавлен');
}
function setupDragAndDrop() {
    const dropzone = document.getElementById('dropzone');
    dropzone.ondrop = (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const idx = document.getElementById('productSelect').value;
        if (!PRODUCTS[idx].media) PRODUCTS[idx].media = [];
        PRODUCTS[idx].media.push(url);
        loadProductForEdit();
        renderProducts();
    };
    dropzone.ondragover = (e) => e.preventDefault();
    dropzone.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const idx = document.getElementById('productSelect').value;
                if (!PRODUCTS[idx].media) PRODUCTS[idx].media = [];
                PRODUCTS[idx].media.push(url);
                loadProductForEdit();
                renderProducts();
            }
        };
        input.click();
    };
}

// === НАВИГАЦИЯ ===
function showPage(page) {
    document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
    document.getElementById(page + 'Page').classList.remove('hidden');
    if (page === 'cart') renderCartList();
    if (page === 'main') renderProducts();
    if (page === 'admin') {
        if (document.getElementById('adminContentBlock').classList.contains('hidden')) {
            document.getElementById('adminLoginBlock').classList.remove('hidden');
        }
    }
}
document.getElementById('checkoutBtn').onclick = () => { alert('✅ Заказ отправлен! (Telegram + почта)'); };

// Инициализация
renderProducts();
updateCartUI();
showPage('main');
</script>
</body>
</html>
