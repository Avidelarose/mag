<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>NŌVA — премиальный магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease, border-color 0.2s ease, color 0.2s ease;
        }

        /* Светлая тема (по умолчанию) */
        :root {
            --bg: #f5f5f7;
            --card-bg: rgba(255,255,255,0.96);
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --border-light: #e9e9ef;
            --accent: #d90429;
            --accent-light: #fff0f2;
            --shadow: 0 20px 40px rgba(0,0,0,0.08);
            --human-brightness: 1;
        }

        /* Тёмная тема */
        body.dark {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-primary: #ffffff;
            --text-secondary: #98989e;
            --border-light: #2c2c2e;
            --accent-light: #2a0a10;
            --shadow: 0 20px 40px rgba(0,0,0,0.4);
            --human-brightness: 0.9;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, Helvetica, sans-serif;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.2s;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        /* Шапка с переключателем темы */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-primary);
            backdrop-filter: blur(10px);
        }

        .screen {
            background: var(--card-bg);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            padding: 28px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none; }

        h1 {
            font-size: 2rem;
            font-weight: 620;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            display: inline-block;
            padding-bottom: 4px;
        }

        /* карточки товаров */
        .product-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
            transition: 0.25s;
            border: 0.5px solid var(--border-light);
        }
        .product-card.selected {
            border: 1px solid var(--accent);
            background: var(--accent-light);
        }
        .product-emoji {
            font-size: 2rem;
            background: var(--bg);
            width: 54px;
            height: 54px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-name { font-weight: 590; font-size: 1rem; }
        .product-price { color: var(--accent); font-weight: 600; margin-top: 6px; }
        .old-price { text-decoration: line-through; color: var(--text-secondary); font-size: 0.75rem; margin-left: 8px; }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 40px;
        }
        .quantity-btn {
            background: var(--card-bg);
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-primary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* формы */
        .form-group { margin-bottom: 22px; }
        label { font-weight: 510; display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 16px 18px;
            border-radius: 34px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(217,4,41,0.2);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
        }
        .radio-option.selected { background: var(--accent); border-color: var(--accent); color: white; }
        .radio-option.selected label { color: white; }

        .file-label {
            background: var(--bg);
            padding: 16px;
            border-radius: 36px;
            text-align: center;
            cursor: pointer;
            border: 1px dashed var(--border-light);
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            font-size: 1rem;
            font-weight: 590;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            padding: 14px;
            border-radius: 44px;
            width: 100%;
            margin-top: 12px;
        }

        /* человечки */
        .humanoid-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .human {
            font-size: 3rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.2s, filter 0.2s;
            cursor: default;
        }
        .human.happy { transform: scale(1.12) rotate(3deg); filter: brightness(var(--human-brightness)); }
        .celebrate { animation: bouncePop 0.45s ease; }
        @keyframes bouncePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25) rotate(5deg); }
            100% { transform: scale(1); }
        }

        .final-question {
            font-size: 1.7rem;
            font-weight: 620;
            text-align: center;
            margin: 20px 0;
            color: var(--text-primary);
        }
        .final-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .success-box {
            background: #2a6b3c20;
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            color: var(--accent);
        }
        footer { text-align: center; color: var(--text-secondary); font-size: 0.7rem; margin-top: 20px; }

        @media (max-width: 550px) {
            body { padding: 12px; }
            .screen { padding: 20px 16px; border-radius: 36px; }
            .final-question { font-size: 1.4rem; }
            .human { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <h1>nōva</h1>
        <button id="themeSwitcher" class="theme-toggle">🌙 Тёмная тема</button>
    </div>

    <!-- экран товары -->
    <div id="shopScreen" class="screen">
        <div class="subtitle">Челябинск · доставка 24h</div>
        <div id="productsList"></div>
        <button id="toOrderBtn" class="btn-primary">Перейти к оформлению →</button>
    </div>

    <!-- экран оформления -->
    <div id="orderScreen" class="screen hidden">
        <div class="subtitle">заполните данные</div>
        <div id="humanContainer" class="humanoid-area"></div>
        <div style="background: var(--bg); border-radius: 32px; padding: 18px; margin-bottom: 24px;">
            <strong>ваш заказ</strong>
            <div id="orderSummary" style="margin-top: 10px;"></div>
        </div>
        <div class="form-group"><label>📞 Телефон</label><input type="tel" id="phone" placeholder="+7 900 000 00 00"></div>
        <div class="form-group"><label>📱 Telegram / VK</label><input type="text" id="social" placeholder="@nickname"></div>
        <div class="form-group"><label>📍 Адрес доставки</label><input type="text" id="address" placeholder="Челябинск, улица..."></div>
        <div class="form-group"><label>⏰ Время доставки</label><select id="timeOption"><option>Не важно</option><option>09:00-12:00</option><option>12:00-15:00</option><option>15:00-18:00</option><option>18:00-21:00</option></select></div>
        <div class="form-group"><label>🧾 Фото чека (СБП 89630905896 Т-Банк)</label><div class="file-label" id="fileLabel">📎 Загрузить фото чека<input type="file" id="receiptPhoto" accept="image/*" style="display:none"></div><div id="fileName" class="file-name" style="margin-top:6px; font-size:0.7rem;"></div></div>
        <button id="sendOrderBtn" class="btn-primary">✅ Оформить заказ</button>
        <button id="backToShopBtn" class="btn-outline">← назад</button>
    </div>

    <!-- финальный экран -->
    <div id="finalScreen" class="screen hidden">
        <div id="finalContent"></div>
    </div>
</div>

<script>
    // -------------------- ТЕЛЕГРАМ --------------------
    const TELEGRAM_BOT_TOKEN = "8112529237:AAGX6nHQEnMcJKflsAg-SmclgdJCD5xzaZU";
    const TELEGRAM_CHAT_ID = "5233384978";

    // -------------------- ТОВАРЫ --------------------
    const PRODUCTS = [
        { id: 1, name: "SSD 256 SP A56", price: 3650, emoji: "💾" },
        { id: 2, name: "Чебурашка мягкий", price: 2600, emoji: "🧸" },
        { id: 3, name: "Зарядка в авто с вольтметром", price: 800, emoji: "🔌" },
        { id: 4, name: "Мини колода карт", price: 700, emoji: "🃏" },
        { id: 5, name: "Жилетка женская цветы", price: 2145, emoji: "🌸" },
        { id: 6, name: "Брелок четырёхлистник", price: 300, emoji: "🔑" },
        { id: 7, name: "Игрушечные сигареты (мыльные пузыри)", price: 1500, emoji: "💨" },
        { id: 8, name: "Цифровой микроскоп", price: 4945, emoji: "🔬" },
        { id: 9, name: "Игровое кресло", price: 9700, emoji: "💺" },
        { id: 10, name: "Сумка кожаная", price: 2375, emoji: "👜", oldPrice: 2500 },
        { id: 11, name: "Пистолет с пульками", price: 1450, emoji: "🔫" },
        { id: 12, name: "Кепка с листьями", price: 1350, emoji: "🧢" }
    ];

    let cart = {};
    let receiptFile = null;
    let finalStep = "main";
    let currentOrderData = null;
    let audioCtx = null;

    // -------------------- ЗВУК "УРА" (web audio) --------------------
    function playHurraySound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.value = 0.2;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
            osc.stop(audioCtx.currentTime + 0.8);
            // дополнительный весёлый тон
            setTimeout(() => {
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.value = 1046.5;
                gain2.gain.value = 0.15;
                osc2.start();
                gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                osc2.stop(audioCtx.currentTime + 0.5);
            }, 150);
        } catch(e) { console.log("звук не поддержан"); }
    }

    // -------------------- ТЕМА --------------------
    function initTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) document.body.classList.add('dark');
        const btn = document.getElementById('themeSwitcher');
        btn.innerText = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        btn.onclick = () => {
            document.body.classList.toggle('dark');
            const nowDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', nowDark ? 'dark' : 'light');
            btn.innerText = nowDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        };
    }

    // -------------------- ЧЕЛОВЕЧКИ С АНИМАЦИЕЙ --------------------
    function renderHumans(containerId) {
        const container = document.getElementById(containerId);
        if(!container) return;
        container.innerHTML = `<div class="human">🧑‍🎨</div><div class="human">🤖</div><div class="human">🕺</div>`;
        const humans = document.querySelectorAll('.human');
        const inputs = ['#phone', '#social', '#address'];
        inputs.forEach(sel => {
            const inp = document.querySelector(sel);
            if(inp) {
                inp.addEventListener('input', () => {
                    humans.forEach(h => { h.classList.add('happy'); setTimeout(()=>h.classList.remove('happy'),300); });
                    if(inp.value.length > 2) humans.forEach(h => { h.classList.add('celebrate'); setTimeout(()=>h.classList.remove('celebrate'),500); });
                });
            }
        });
        setInterval(() => {
            humans.forEach(h => { if(Math.random()>0.7) h.classList.add('happy'); setTimeout(()=>h.classList.remove('happy'),400); });
        }, 2200);
    }

    // отрисовка товаров
    function renderProducts() {
        const container = document.getElementById('productsList');
        container.innerHTML = '';
        PRODUCTS.forEach(p => {
            const qty = cart[p.id] || 0;
            const card = document.createElement('div');
            card.className = `product-card ${qty>0 ? 'selected' : ''}`;
            card.innerHTML = `
                <div class="product-emoji">${p.emoji}</div>
                <div class="product-info"><div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} ₽ ${p.oldPrice ? `<span class="old-price">${p.oldPrice} ₽</span>` : ''}</div></div>
                <div class="quantity-control"><button class="quantity-btn" data-id="${p.id}" data-delta="-1">−</button><span class="quantity-num">${qty}</span><button class="quantity-btn" data-id="${p.id}" data-delta="1">+</button></div>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll('.quantity-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                let newQty = (cart[id]||0) + parseInt(btn.dataset.delta);
                if(newQty<=0) delete cart[id];
                else cart[id] = newQty;
                renderProducts();
            });
        });
    }

    function updateOrderSummary() {
        let total=0, qty=0, html='';
        for(let id in cart){
            const p = PRODUCTS.find(pr=>pr.id==id);
            if(p){
                let cnt = cart[id];
                let sum = p.price*cnt;
                total+=sum; qty+=cnt;
                html+=`<div>${p.name} — ${cnt} шт = ${sum} ₽</div>`;
            }
        }
        if(!html) html='<div>нет товаров</div>';
        html+=`<div style="margin-top:10px; font-weight:600;">💰 ${total.toLocaleString()} ₽ (${qty} шт)</div>`;
        document.getElementById('orderSummary').innerHTML = html;
    }

    // телеграм отправка
    async function sendToTelegram(orderData, finalAnswer) {
        let msg = `🛍️ НОВЫЙ ЗАКАЗ (Челябинск)\n📦 Товары:\n${orderData.items}\n💰 Итого: ${orderData.total} ₽ (${orderData.qty} шт)\n👤 ${orderData.phone} | ${orderData.social}\n📍 ${orderData.address} | ⏰ ${orderData.timeSlot}\n🧾 Чек: ${orderData.hasPhoto ? "есть фото" : "нет фото"}\n💝 ${finalAnswer === 'yes' ? "➕ согласие на доп.условие" : "➖ без доп.условия"}`;
        try {
            if(orderData.photoFile) {
                let fd = new FormData();
                fd.append('chat_id', TELEGRAM_CHAT_ID);
                fd.append('caption', msg);
                fd.append('photo', orderData.photoFile, 'check.jpg');
                let r = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`,{method:'POST',body:fd});
                return r.ok;
            } else {
                let r = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID,text:msg})});
                return r.ok;
            }
        } catch(e) { return false; }
    }

    // финальный опрос с человечками
    function renderFinalScreen(orderData) {
        const finalDiv = document.getElementById('finalContent');
        const humansHtml = `<div class="humanoid-area"><div class="human">💃</div><div class="human">🕺</div><div class="human">🧑‍🚀</div></div>`;
        if(finalStep === "main") {
            finalDiv.innerHTML = `${humansHtml}<div class="final-question">🤔 А минетик будет? 🤔</div><div class="final-buttons"><button id="fYes" class="btn-primary" style="width:auto; padding:12px 28px;">💖 ДА</button><button id="fNo" class="btn-outline" style="width:auto;">😢 НЕТ</button></div>`;
            document.getElementById('fYes')?.onclick = () => handleFinalAnswer('yes', orderData);
            document.getElementById('fNo')?.onclick = () => handleFinalAnswer('no', orderData);
        } else if(finalStep === "confirm1") {
            finalDiv.innerHTML = `${humansHtml}<div class="final-question">😳 Уверенна?</div><div class="final-buttons"><button id="cYes" class="btn-primary" style="width:auto;">ДА, УВЕРЕНА</button><button id="cNo" class="btn-outline" style="width:auto;">НЕТ, ПЕРЕДУМАЛА</button></div>`;
            document.getElementById('cYes')?.onclick = () => handleFinalAnswer('confirm_yes', orderData);
            document.getElementById('cNo')?.onclick = () => handleFinalAnswer('confirm_no', orderData);
        } else if(finalStep === "confirm2") {
            finalDiv.innerHTML = `${humansHtml}<div class="final-question">⚠️ Это совсем не первое свидание...</div><div class="final-buttons"><button id="acceptBtn" class="btn-primary" style="width:auto;">😊 ЛАДНО, СОГЛАШАЮСЬ</button><button id="rejectBtn" class="btn-outline" style="width:auto;">😔 ОТКАЗАТЬСЯ</button></div>`;
            document.getElementById('acceptBtn')?.onclick = () => handleFinalAnswer('accept', orderData);
            document.getElementById('rejectBtn')?.onclick = () => handleFinalAnswer('reject', orderData);
        } else if(finalStep === "rejected") {
            finalDiv.innerHTML = `${humansHtml}<div class="final-question" style="opacity:0.7;">❌ Отказ оформлен</div><div class="success-box">Свидания не будет 💔<br><button id="restartBtn" class="btn-primary" style="margin-top:20px;">Начать заново</button></div>`;
            document.getElementById('restartBtn')?.onclick = () => location.reload();
        } else if(finalStep === "done") {
            finalDiv.innerHTML = `${humansHtml}<div class="success-box"><span style="font-size:2rem;">🎉✨</span><br/><strong>ВСЁ ОТПРАВЛЕНО!</strong><br/>Жди меня, я уже спешу 💕<br/><button id="restartBtn2" class="btn-primary" style="margin-top:24px;">🌹 Новый заказ</button></div>`;
            document.getElementById('restartBtn2')?.onclick = () => location.reload();
        }
        // анимируем человечков
        const humans = document.querySelectorAll('.human');
        if(humans.length) setInterval(() => { humans.forEach(h=> h.classList.add('happy')); setTimeout(()=> humans.forEach(h=> h.classList.remove('happy')),400); }, 2500);
    }

    async function handleFinalAnswer(ans, orderData) {
        if(ans === 'yes' || ans === 'confirm_yes' || ans === 'accept') {
            playHurraySound(); // 🔊 УРА!
            await sendToTelegram(orderData, 'yes');
            finalStep = "done";
            renderFinalScreen(orderData);
        } 
        else if(ans === 'no') { finalStep = "confirm1"; renderFinalScreen(orderData); }
        else if(ans === 'confirm_no') { finalStep = "confirm2"; renderFinalScreen(orderData); }
        else if(ans === 'reject') { finalStep = "rejected"; renderFinalScreen(orderData); }
    }

    async function onSubmitOrder() {
        let phone = document.getElementById('phone').value.trim();
        let social = document.getElementById('social').value.trim();
        let address = document.getElementById('address').value.trim();
        let timeSlot = document.getElementById('timeOption').value;
        if(!phone || !social || !address) { alert("Заполните телефон, соцсеть и адрес"); return; }
        if(Object.keys(cart).length===0) { alert("Корзина пуста"); return; }
        let itemsStr = "", total=0, totalQty=0;
        for(let id in cart){
            let p = PRODUCTS.find(pr=>pr.id==id);
            if(p){
                let cnt = cart[id];
                total += p.price * cnt;
                totalQty += cnt;
                itemsStr += `${p.name} — ${cnt}шт = ${p.price*cnt}₽\n`;
            }
        }
        currentOrderData = {
            items: itemsStr, total: total, qty: totalQty,
            phone, social, address, timeSlot,
            hasPhoto: !!receiptFile, photoFile: receiptFile
        };
        finalStep = "main";
        document.getElementById('shopScreen').classList.add('hidden');
        document.getElementById('orderScreen').classList.add('hidden');
        document.getElementById('finalScreen').classList.remove('hidden');
        renderFinalScreen(currentOrderData);
    }

    // переключение экранов
    document.getElementById('toOrderBtn').onclick = () => {
        if(Object.keys(cart).length===0) { alert("Выберите товары"); return; }
        updateOrderSummary();
        document.getElementById('shopScreen').classList.add('hidden');
        document.getElementById('orderScreen').classList.remove('hidden');
        document.getElementById('finalScreen').classList.add('hidden');
        renderHumans('humanContainer');
    };
    document.getElementById('backToShopBtn').onclick = () => {
        document.getElementById('shopScreen').classList.remove('hidden');
        document.getElementById('orderScreen').classList.add('hidden');
        document.getElementById('finalScreen').classList.add('hidden');
    };
    document.getElementById('sendOrderBtn').onclick = onSubmitOrder;

    // загрузка фото
    const fileInput = document.getElementById('receiptPhoto');
    const fileLabelDiv = document.getElementById('fileLabel');
    const fileNameSpan = document.getElementById('fileName');
    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length) { receiptFile = e.target.files[0]; fileNameSpan.innerText = `📸 ${receiptFile.name}`; }
        else { receiptFile = null; fileNameSpan.innerText = ''; }
    });
    fileLabelDiv.addEventListener('click', () => fileInput.click());

    // старт
    initTheme();
    renderProducts();
</script>
</body>
</html>
